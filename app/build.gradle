apply plugin: 'com.android.application'
android {
    compileSdkVersion 31
    defaultConfig {
        applicationId "com.senol.masteragent"
        minSdkVersion 21
        targetSdkVersion 31
        versionCode 1
        versionName "1.0"
    }
    packagingOptions {
        exclude 'META-INF/*'
        pickFirst 'LICENSE.txt'
    }
}
